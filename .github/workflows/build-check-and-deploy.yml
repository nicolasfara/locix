name: CI/CD Process

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest] # , windows-latest]
        java: ['21', '25']
    defaults:
      run:
        shell: bash 
    steps:
      - &checkout
        name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - &setup-java
        name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      - &mill-cache
        name: Cache Mill dependencies
        uses: coursier/cache-action@e47d7d35a0d3a2c7f649ca5c63dfc2bbfaa002e7 # v8.0.1
      - name: Build Project
        run: ./mill __.compile
      - name: Run Tests
        run: ./mill __.test

  qa:
    name: Code Quality Analysis
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest] # , windows-latest]
        java: ['21', '25']
    defaults:
      run:
        shell: bash 
    steps:
      - *checkout
      - *setup-java
      - *mill-cache
      - name: Run Code Quality Analysis
        run: "true" # Currently QA tools are not aware of capture checking, so they fail because of parsing errors.
        # run: |
        #   ./mill mill.scalalib.scalafmt/checkFormatAll
        #   ./mill __.fix --check
        
  success:
    runs-on: ubuntu-24.04
    needs:
      - qa
      - build
    if: >-
      always() && (
        contains(join(needs.*.result, ','), 'failure')
        || !contains(join(needs.*.result, ','), 'cancelled')
      )
    steps:
      - name: Verify that there were no failures
        run: ${{ !contains(join(needs.*.result, ','), 'failure') }}      